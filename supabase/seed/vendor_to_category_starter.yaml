# vendor_to_category.yaml
# Starter rules for the Sure.am Import Converter (v0.2 onwards).
# Maps merchant/vendor substrings (case-insensitive) to Halan taxonomy categories.
#
# RULES OF THE GAME:
# - First match wins. Order top-to-bottom matters.
# - Never auto-assign Leakage (parent 14) or Review (parent 15) categories.
# - Default for unmatched vendors is `Uncategorized Review`.
# - LEAKAGE IS A TAG, NOT A CATEGORY. During review, the user adds tag `leakage`
#   to impulse rows. The category stays as the underlying spend type
#   (e.g. `Food Delivery`, `Coffee / Cafes`). Filter by tag in Sure to see leakage.
#
# To extend: append new rules at the bottom of the relevant section,
# or at the top if you need them to take precedence over a generic rule.

# ─────────────────────────────────────────────────────────────────────────
# 01 Income
# ─────────────────────────────────────────────────────────────────────────
- match: "SALARY"
  category: "Salary"
- match: "INT.PD"           # HDFC interest credit narration
  category: "Interest Income"
- match: "SB INT"
  category: "Interest Income"
- match: "FD INT"
  category: "Interest Income"
- match: "INTEREST CR"
  category: "Interest Income"
- match: "DIVIDEND"
  category: "Dividend Income"
- match: "CASHBACK"
  category: "Refunds Received"
- match: "REFUND"
  category: "Refunds Received"

